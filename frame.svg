<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- Transparent center - where user photo will show through -->
  <rect width="1600" height="900" fill="none"/>
  
  <!-- Top border decoration -->
  <rect x="0" y="0" width="1600" height="80" fill="#1a0a2e"/>
  <rect x="0" y="820" width="1600" height="80" fill="#1a0a2e"/>
  <rect x="0" y="0" width="80" height="900" fill="#1a0a2e"/>
  <rect x="1520" y="0" width="80" height="900" fill="#1a0a2e"/>

  <!-- Corner decorations -->
  <rect x="0" y="0" width="160" height="160" fill="#1a0a2e"/>
  <rect x="1440" y="0" width="160" height="160" fill="#1a0a2e"/>
  <rect x="0" y="740" width="160" height="160" fill="#1a0a2e"/>
  <rect x="1440" y="740" width="160" height="160" fill="#1a0a2e"/>

  <!-- Corner star ornaments -->
  <text x="80" y="100" font-size="60" fill="#c9a96e" text-anchor="middle" font-family="serif">✦</text>
  <text x="1520" y="100" font-size="60" fill="#c9a96e" text-anchor="middle" font-family="serif">✦</text>
  <text x="80" y="870" font-size="60" fill="#c9a96e" text-anchor="middle" font-family="serif">✦</text>
  <text x="1520" y="870" font-size="60" fill="#c9a96e" text-anchor="middle" font-family="serif">✦</text>

  <!-- Gold inner border line -->
  <rect x="80" y="80" width="1440" height="740" fill="none" stroke="#c9a96e" stroke-width="3"/>
  <rect x="90" y="90" width="1420" height="720" fill="none" stroke="#c9a96e" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- Top center text area -->
  <rect x="600" y="0" width="400" height="80" fill="#1a0a2e"/>
  <text x="800" y="52" font-size="22" fill="#c9a96e" text-anchor="middle" font-family="Georgia, serif" letter-spacing="6">✦ PHOTOCARD ✦</text>

  <!-- Bottom info bar -->
  <rect x="0" y="820" width="1600" height="80" fill="#1a0a2e"/>
  <text x="800" y="868" font-size="18" fill="#c9a96e" text-anchor="middle" font-family="Georgia, serif" letter-spacing="4">2025  ·  LIMITED EDITION</text>

  <!-- Side decorative lines -->
  <line x1="80" y1="200" x2="80" y2="700" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  <line x1="1520" y1="200" x2="1520" y2="700" stroke="#c9a96e" stroke-width="1" opacity="0.5"/>
  
  <!-- Small decorative dots on sides -->
  <circle cx="80" cy="450" r="4" fill="#c9a96e"/>
  <circle cx="1520" cy="450" r="4" fill="#c9a96e"/>
</svg>
